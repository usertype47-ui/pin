<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶維繫管理系統 - 導覽</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e2e8f0;
            --accent: #60a5fa;
            --bg-color: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 跑馬燈：自動偵測久未下單 */
        #marquee-container {
            background-color: yellow;
            color: red;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 8px 0;
            overflow: hidden;
            white-space: nowrap;
            display: none; 
            z-index: 2000;
        }
        
        #marquee-content {
            display: inline-block;
            animation: marquee 30s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* 浮動導覽列框架 */
        nav {
            position: sticky;
            top: 20px;
            margin: 20px auto;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            overflow-x: auto;
            white-space: nowrap;
        }

        nav::-webkit-scrollbar { display: none; }

        .nav-item {
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            color: #94a3b8;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 15px rgba(96, 165, 250, 0.5);
        }

        /* 內容顯示區 */
        #content-container {
            flex: 1;
            padding: 40px;
            padding-bottom: 60px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
            box-sizing: border-box;
        }

        /* 懸浮維繫產品框：往上一點點、直式排列 */
        #product-floating-box {
            position: absolute;
            top: 15px; 
            right: 40px;
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid yellow;
            padding: 10px 16px;
            border-radius: 10px;
            width: max-content;
            max-width: 220px;
            display: none; 
            z-index: 10;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.3);
            color: yellow;
            font-weight: bold;
            font-size: 0.95rem;
            animation: blink 1.5s infinite;
            
            /* 直式佈局 */
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px yellow; }
            50% { opacity: 0.6; text-shadow: none; }
        }

        /* 標準雙欄網格 */
        .data-row {
            display: grid;
            grid-template-columns: 140px 1fr;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
            font-size: 1.1rem;
            align-items: start;
        }

        .label { color: var(--accent); font-weight: bold; }
        
        h2 { 
    margin-top: 0; 
    color: #fff; 
    background: rgba(96, 165, 250, 0.2); 
    padding: 10px 20px;
    border-radius: 8px;
    border-bottom: none; 
    font-size: 1.4rem; /* 微調字體大小，配合縮短寬度 */
    margin-bottom: 20px;
    
    /* === 關鍵編譯設定 === */
    width: fit-content;    /* 寬度隨文字內容自動收縮 */
    min-width: 120px;      /* 設定最小寬度，避免太窄 */
    max-width: 55%;        /* 設定最大寬度，避免爆版 */
    margin-left: 0;        /* 強制向左靠齊 */
    margin-right: auto;    /* 確保右邊推開 */
    box-sizing: border-box;
}
        #company-title {
    display: none; /* 直接隱藏該元素 */
}
         /* 若移除 h2，建議增加 .card 內部的頂部填充 (padding-top) */
.card {
    /* ...原有設定... */
    padding-top: 50px; /* 根據需求調整，留出空間 */
}

        
        /* 輸入框與按鈕樣式 */
        .input-group { display: flex; gap: 8px; width: 100%; }
        .input-group input { width: 150px; padding: 8px 12px; border-radius: 6px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 1rem;}
        .input-group input:focus { outline: 1px solid var(--accent); }
        
        .btn-add { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.2s;}
        .btn-add:hover { background: #059669; }
        
        .btn-delete { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: background 0.2s;}
        .btn-delete:hover { background: #dc2626; }
    </style>
</head>
<body>

<div id="marquee-container">
    <div id="marquee-content"></div>
</div>

<nav id="navbar"></nav>

<div id="content-container">
    <div class="card" id="display-card">
        <h2>系統載入中...</h2>
    </div>
</div>

<script>
    // ======= Firebase 配置 =======
    const firebaseConfig = {
        apiKey: "AIzaSyAvLmHzZK6HwMLJFo3JyzY_T_azpElk1Lc",
        authDomain: "beautiful-68dbc.firebaseapp.com",
        databaseURL: "https://beautiful-68dbc-default-rtdb.firebaseio.com",
        projectId: "beautiful-68dbc",
        storageBucket: "beautiful-68dbc.firebasestorage.app",
        messagingSenderId: "348466975949",
        appId: "1:348466975949:web:1f6f5483ce3c0f91a34584"
    };
    
    // 初始化 Firebase 與 Firestore
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    // ===============================================

    // 原始備用資料
    const originalCSVData = [
        {code: "06005", name: "勝銓", company: "勝銓實業有限公司", contact: "楊勝銓", phone: "06-2011391", region: "台南", terms: "100天", lastOrder: "", daysAgo: "", perf: "", cases: "", visit: "", note: ""},
        {code: "06011", name: "惟鴻", company: "惟鴻工業有限公司", contact: "蕭惟鴻", phone: "0988-078065", region: "台南", terms: "85天T/T", lastOrder: "", daysAgo: "", perf: "", cases: "", visit: "", note: ""},
        {code: "06012", name: "寶源", company: "寶源事業有限公司", contact: "蔡振源", phone: "06-2710853", region: "台南", terms: "35天扣5%", lastOrder: "new", daysAgo: "", perf: "", cases: "", visit: "", note: ""},
        {code: "07153", name: "寶凱", company: "寶凱電子企業股份有限公司", contact: "王曉齡", phone: "07-7872900", region: "高雄", terms: "60天T/T", lastOrder: "2026-06-12", daysAgo: "6", perf: "", cases: "", visit: "", note: ""}
    ];

    let customers = [];
    let currentCustomer = null;

    // 將日期格式轉換為 MM/DD (僅用於顯示)
    function formatDateToMMDD(dateStr) {
        if (!dateStr) return '無';
        const lowerStr = dateStr.toString().toLowerCase().trim();
        if (lowerStr === "new" || lowerStr === "nwe") return dateStr;

        const date = new Date(dateStr);
        // 如果無法解析為正常日期，就退回原本的字串顯示
        if (isNaN(date.getTime())) return dateStr;

        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        return `${mm}/${dd}`;
    }

    // 精準計算活躍度邏輯 (仍基於完整日期來準確計算天數)
    function calculateActivity(lastOrderStr) {
        if (!lastOrderStr) return "🔴久未下單"; 
        
        const lowerStr = lastOrderStr.toString().toLowerCase().trim();
        if (lowerStr === "new" || lowerStr === "nwe") return "🆕️新案開發";

        const lastDate = new Date(lastOrderStr);
        if (isNaN(lastDate.getTime())) return "🔴久未下單";

        const today = new Date();
        
        const todayUTC = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
        const lastUTC = Date.UTC(lastDate.getFullYear(), lastDate.getMonth(), lastDate.getDate());

        const diffTime = todayUTC - lastUTC;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays < 0) return "🟢正常下單"; 
        if (diffDays < 10) return "㊗️固定下單"; 
        if (diffDays >= 60) return "🔴久未下單"; 
        return "🟢正常下單"; 
    }

    async function initSystem() {
        try {
            const querySnapshot = await db.collection('customers').get();
            if (querySnapshot.empty) {
                console.log("資料庫為空，使用預設資料。");
                customers = originalCSVData.map(c => ({...c, products: []}));
            } else {
                customers = [];
                querySnapshot.forEach((doc) => {
                    customers.push({ id: doc.id, ...doc.data() });
                });
            }
        } catch (error) {
            console.error("資料庫讀取失敗：", error);
            customers = originalCSVData.map(c => ({...c, products: []}));
        }

        renderMarquee();
        renderNav();
        document.getElementById('display-card').innerHTML = "<h2>請選擇上方客戶查看資料</h2>";
    }

    function renderMarquee() {
        const warningList = customers
            .filter(c => calculateActivity(c.lastOrder) === "🔴久未下單")
            .map(c => c.name);

        const marqueeContainer = document.getElementById('marquee-container');
        const marqueeContent = document.getElementById('marquee-content');

        if (warningList.length > 0) {
            marqueeContainer.style.display = "block";
            marqueeContent.textContent = `⚠️ 警告！以下客戶已久未下單：${warningList.join(' 、 ')} ⚠️`;
        } else {
            marqueeContainer.style.display = "none";
        }
    }

    function renderNav() {
        const nav = document.getElementById('navbar');
        nav.innerHTML = '';
        
        customers.forEach((c, index) => {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.textContent = c.name;
            
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                showCustomerData(index);
            });
            nav.appendChild(item);
        });
    }

    function showCustomerData(index) {
        currentCustomer = customers[index];
        const activity = calculateActivity(currentCustomer.lastOrder);
        // 將顯示的日期轉為 MM/DD
        const displayDate = formatDateToMMDD(currentCustomer.lastOrder);
        
        const displayCard = document.getElementById('display-card');
        displayCard.innerHTML = `
            <div id="product-floating-box"></div>
            <h2 id="company-title">${currentCustomer.company || '無公司名稱'}</h2>
            <div class="data-row"><div class="label">客戶代號:</div><div>${currentCustomer.code || ''}</div></div>
            <div class="data-row"><div class="label">聯絡人:</div><div>${currentCustomer.contact || ''}</div></div>
            <div class="data-row"><div class="label">電話:</div><div>${currentCustomer.phone || ''}</div></div>
            <div class="data-row"><div class="label">地區:</div><div>${currentCustomer.region || ''}</div></div>
            <div class="data-row"><div class="label">付款條件:</div><div>${currentCustomer.terms || ''}</div></div>
            <div class="data-row"><div class="label">最後下單日:</div><div>${displayDate}</div></div>
            <div class="data-row"><div class="label">訂單活躍度:</div><div style="font-weight:bold; font-size:1.2rem;">${activity}</div></div>
            <div class="data-row"><div class="label">本年業績:</div><div>${currentCustomer.perf || ''}</div></div>
            <div class="data-row"><div class="label">目前案件數:</div><div>${currentCustomer.cases || ''}</div></div>
            <div class="data-row"><div class="label">下次拜訪日:</div><div>${currentCustomer.visit || ''}</div></div>
            <div class="data-row"><div class="label">備註:</div><div>${currentCustomer.note || ''}</div></div>
            
            <div class="data-row" style="border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
               <div class="data-row" style="display: flex; flex-direction: column; gap: 8px; border-bottom: none; padding-bottom: 0; margin-bottom: 0;">
    <div class="label">維繫商品管理:</div>
    <div class="input-group">
        <input type="text" id="new-product-name" placeholder="輸入產品以新增，或輸入完全相符名稱以刪除">
        <button class="btn-add" onclick="addProduct()">新增</button>
        <button class="btn-delete" onclick="deleteProductByName()">刪除</button>
    </div>
</div>

        `;

        renderProducts();
    }

    // 渲染維繫產品 (資料僅顯示於懸浮框)
    function renderProducts() {
        const floatingBox = document.getElementById('product-floating-box');
        if (!floatingBox) return;

        const products = currentCustomer.products || [];

        // 依要求直接換行顯示，無圓點符號
        if (products.length > 0) {
            floatingBox.style.display = "flex";
            floatingBox.innerHTML = `
                <div style="border-bottom: 1px solid rgba(255,255,0,0.4); padding-bottom: 3px; margin-bottom: 4px; font-size: 0.85rem; opacity: 0.8; width: 100%;">維繫商品：</div>
                ${products.map(p => `<div style="word-break: break-all; margin-top: 2px;">${p}</div>`).join('')}
            `;
        } else {
            floatingBox.style.display = "none";
        }
    }

    // 新增維繫產品並同步至 Firebase
    async function addProduct() {
        if(!currentCustomer) return;
        const input = document.getElementById('new-product-name');
        const val = input.value.trim();
        if(!val) return;

        if(!currentCustomer.products) currentCustomer.products = [];
        
        // 避免重複加入相同名稱
        if(!currentCustomer.products.includes(val)) {
            currentCustomer.products.push(val);
            input.value = '';
            
            await updateFirebaseProducts();
            renderProducts();
        } else {
            alert('產品已存在！');
        }
    }

    // 刪除維繫產品 (輸入完全相符名稱刪除)
    async function deleteProductByName() {
        if(!currentCustomer) return;
        const input = document.getElementById('new-product-name');
        const val = input.value.trim();
        if(!val) return;

        if(!currentCustomer.products || currentCustomer.products.length === 0) {
            alert('目前無維繫商品可刪除！');
            return;
        }

        const index = currentCustomer.products.indexOf(val);
        if(index !== -1) {
            currentCustomer.products.splice(index, 1);
            input.value = '';
            await updateFirebaseProducts();
            renderProducts();
        } else {
            alert('找不到完全相符的產品名稱，無法刪除！請確認輸入是否正確。');
        }
    }

    // 更新 Firebase 中的維繫產品
    async function updateFirebaseProducts() {
        if(!currentCustomer || !currentCustomer.id) {
            console.error("無有效的 Document ID，無法同步至雲端資料庫（目前正使用本地預設資料）。");
            return;
        }
        try {
            await db.collection('customers').doc(currentCustomer.id).update({
                products: currentCustomer.products
            });
            console.log("雲端產品更新成功");
        } catch (error) {
            console.error("Firebase 產品更新失敗", error);
        }
    }

    // 初始化執行
    initSystem();
</script>

</body>
</html>
